name: GEX DEX Latest Bar Fix CI

on:
  push:
    branches:
      - codex/fix-gex-dex-latest-bar-anchor
    paths-ignore:
      - .gex-dex-latest-bar-ci-result
      - .gex-dex-latest-bar-ci-log

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-gex-dex-latest-bar-anchor
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify
        id: verify
        continue-on-error: true
        run: |
          set -o pipefail
          {
            npm ci
            echo '===== focused test ====='
            node --test tests/chart-gex-dex-levels.test.js
          } 2>&1 | tee .gex-dex-latest-bar-ci-log
      - name: Publish result
        if: always()
        env:
          OUTCOME: ${{ steps.verify.outcome }}
          VERIFIED_SHA: ${{ github.sha }}
        run: |
          printf 'result=%s\nverified_sha=%s\n' "$OUTCOME" "$VERIFIED_SHA" > .gex-dex-latest-bar-ci-result
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gex-dex-latest-bar-ci-result .gex-dex-latest-bar-ci-log
          git commit -m "ci: record latest-bar GEX DEX verification" || exit 0
          git push origin HEAD:codex/fix-gex-dex-latest-bar-anchor
