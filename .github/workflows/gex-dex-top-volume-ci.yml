name: GEX DEX Top Volume CI

on:
  push:
    branches:
      - codex/gex-dex-top-volume-30
    paths-ignore:
      - .gex-dex-top-volume-ci-result
      - .gex-dex-top-volume-ci-log

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/gex-dex-top-volume-30
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify
        id: verify
        continue-on-error: true
        run: |
          set -o pipefail
          {
            npm ci
            echo '===== focused GEX DEX tests ====='
            node --test \
              tests/gex-dex-top-volume-watchlist.test.js \
              tests/gex-dex-universe.test.js \
              tests/gex-dex-fetcher.test.js \
              tests/gammalens-gex-dex.test.js \
              tests/gex-dex-snapshots.test.js
            echo '===== complete Node test suite ====='
            node --test tests/*.test.js
            echo '===== Next.js production build ====='
            npm run build
          } 2>&1 | tee .gex-dex-top-volume-ci-log
      - name: Publish result
        if: always()
        env:
          OUTCOME: ${{ steps.verify.outcome }}
          VERIFIED_SHA: ${{ github.sha }}
        run: |
          printf 'result=%s\nverified_sha=%s\n' "$OUTCOME" "$VERIFIED_SHA" > .gex-dex-top-volume-ci-result
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gex-dex-top-volume-ci-result .gex-dex-top-volume-ci-log
          git commit -m "ci: record GEX DEX top-volume verification" || exit 0
          git push origin HEAD:codex/gex-dex-top-volume-30
