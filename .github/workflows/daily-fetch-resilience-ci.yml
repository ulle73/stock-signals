name: Daily Fetch Resilience CI

on:
  push:
    branches:
      - codex/daily-fetch-resilience
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/daily-fetch-resilience
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Run focused coverage tests
        run: node --test tests/daily-price-coverage.test.js tests/daily-refresh-check.test.js tests/fetch-daily-workflow.test.js
      - name: Install dependencies
        run: npm ci
      - name: Run full tests
        run: node --test tests/*.test.js
      - name: Build
        run: npm run build
