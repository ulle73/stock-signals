name: Fetch Daily Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: '23 7 * * 1-5'

concurrency:
  group: fetch-daily
  cancel-in-progress: false

jobs:
  fetch-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch daily market data
        run: npm run fetch:daily
