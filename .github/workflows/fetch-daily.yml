name: Fetch Daily Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: '53 21 * * 1-5'

concurrency:
  group: fetch-daily
  cancel-in-progress: false

env:
  DATABASE_TARGET: cockroach
  DATABASE_URL_COCKROACH: ${{ secrets.DATABASE_URL_COCKROACH }}
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: '1'
  MARKOV_PAPER_ACCOUNTS: 'bear10,bull10,bull20'
  MARKOV_PAPER_BEAR10_STRATEGY_NAME: 'bottom_10_bear_weekly'
  MARKOV_PAPER_BEAR10_API_BASE_URL: 'https://paper-api.alpaca.markets/v2'
  MARKOV_PAPER_BEAR10_API_KEY: ${{ secrets.MARKOV_PAPER_BEAR10_API_KEY }}
  MARKOV_PAPER_BEAR10_API_SECRET: ${{ secrets.MARKOV_PAPER_BEAR10_API_SECRET }}
  MARKOV_PAPER_BEAR10_TRADING_ENABLED: ${{ secrets.MARKOV_PAPER_BEAR10_TRADING_ENABLED }}
  MARKOV_PAPER_BEAR10_SHORTING_ENABLED: 'true'
  MARKOV_PAPER_BULL10_STRATEGY_NAME: 'top_10_bull_weekly'
  MARKOV_PAPER_BULL10_API_BASE_URL: 'https://paper-api.alpaca.markets/v2'
  MARKOV_PAPER_BULL10_API_KEY: ${{ secrets.MARKOV_PAPER_BULL10_API_KEY }}
  MARKOV_PAPER_BULL10_API_SECRET: ${{ secrets.MARKOV_PAPER_BULL10_API_SECRET }}
  MARKOV_PAPER_BULL10_TRADING_ENABLED: ${{ secrets.MARKOV_PAPER_BULL10_TRADING_ENABLED }}
  MARKOV_PAPER_BULL20_STRATEGY_NAME: 'top_20_bull_weekly'
  MARKOV_PAPER_BULL20_API_BASE_URL: 'https://paper-api.alpaca.markets/v2'
  MARKOV_PAPER_BULL20_API_KEY: ${{ secrets.MARKOV_PAPER_BULL20_API_KEY }}
  MARKOV_PAPER_BULL20_API_SECRET: ${{ secrets.MARKOV_PAPER_BULL20_API_SECRET }}
  MARKOV_PAPER_BULL20_TRADING_ENABLED: ${{ secrets.MARKOV_PAPER_BULL20_TRADING_ENABLED }}

jobs:
  fetch-and-calculate-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Fetch daily market data
        run: npm run fetch:daily

      - name: Fetch OCC daily volume totals
        run: npm run fetch:occ-volume-totals

      - name: Fetch FINRA PLCE short volume
        run: npm run fetch:finra-short-volume

      - name: Fetch Barchart breadth snapshots
        run: npm run fetch:barchart-breadth

      - name: Fetch implied-volatility proxy inputs
        run: npm run fetch:implied-volatility-proxy

      - name: Fetch macro-matrix Yahoo proxy inputs
        run: npm run fetch:macro-matrix-yahoo-proxy

      - name: Calculate daily indicators
        run: npm run calculate:daily

  calculate-derived-signals:
    needs: fetch-and-calculate-daily
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Calculate ticker Markov
        run: npm run calculate:ticker-markov

      - name: Calculate CVOL call-volume indicator
        run: npm run calculate:cvol-call-volume

      - name: Calculate PLCE short-volume indicator
        run: npm run calculate:plce-short-volume

      - name: Calculate R3TW MMTW breadth indicator
        run: npm run calculate:r3tw-mmtw-breadth

      - name: Calculate IVOL RVOL ratio indicator
        run: npm run calculate:implied-volatility-ratio

      - name: Calculate sector breadth
        run: npm run calculate:sector-breadth

      - name: Calculate sector signals
        run: npm run calculate:sector-signals

      - name: Calculate market signals
        run: npm run calculate:signals

      - name: Calculate MA200 breadth forward-return model
        run: npm run calculate:market-breadth-ma200-forward-return

      - name: Calculate empirical MA200 breadth forward-return model
        run: npm run calculate:market-breadth-ma200-forward-return-empirical

      - name: Calculate trading signals
        run: npm run calculate:trading-signals

      - name: Study ticker Markov strategies
        run: npm run study:ticker-markov

      - name: Calculate position facts
        run: npm run calculate:position-facts

      - name: Calculate position signals
        run: npm run calculate:position-signals

      - name: Calculate swing signals
        run: npm run calculate:swing-signals

      - name: Calculate swing watchlists
        run: npm run calculate:swing-watchlists

      - name: Seed strategy definitions
        run: npm run seed:strategies

  run-daily-backtests:
    needs: calculate-derived-signals
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Run daily backtests
        run: npm run backtest:daily

  execute-markov-paper-strategies:
    needs: calculate-derived-signals
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Execute Markov paper strategies
        if: ${{ env.MARKOV_PAPER_BEAR10_API_KEY != '' && env.MARKOV_PAPER_BULL10_API_KEY != '' && env.MARKOV_PAPER_BULL20_API_KEY != '' }}
        run: npm run alpaca:markov-paper-execute
