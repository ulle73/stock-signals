name: Professional Chart Branch CI

on:
  push:
    branches:
      - codex/professional-chart-v1
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  chart:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: codex/professional-chart-v1
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Run RYD OBV chart tests
        run: node --test tests/chart-ryd-obv-panel.test.js

      - name: Install locked dependencies
        run: npm ci

      - name: Run complete test suite
        run: node --test tests/*.test.js

      - name: Build production application
        run: npm run build
