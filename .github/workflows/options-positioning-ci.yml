name: Options Positioning CI

on:
  push:
    branches:
      - codex/chart-options-positioning-bars
    paths-ignore:
      - .options-positioning-ci-result
      - .options-positioning-ci-log

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/chart-options-positioning-bars
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify
        id: verify
        continue-on-error: true
        run: |
          set -o pipefail
          {
            npm ci
            echo '===== focused tests ====='
            node --test tests/options-ladder.test.js
            echo '===== complete Node test suite ====='
            node --test tests/*.test.js
            echo '===== Next.js production build ====='
            npm run build
          } 2>&1 | tee .options-positioning-ci-log
      - name: Publish result
        if: always()
        env:
          OUTCOME: ${{ steps.verify.outcome }}
          VERIFIED_SHA: ${{ github.sha }}
        run: |
          printf 'result=%s\nverified_sha=%s\n' "$OUTCOME" "$VERIFIED_SHA" > .options-positioning-ci-result
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .options-positioning-ci-result .options-positioning-ci-log
          git commit -m "ci: record options positioning verification" || exit 0
          git push origin HEAD:codex/chart-options-positioning-bars
