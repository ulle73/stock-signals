name: Chart Context Layers CI

on:
  push:
    branches:
      - codex/chart-context-layers-v1
    paths-ignore:
      - .chart-context-ci-result

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/chart-context-layers-v1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Focused chart context tests
        run: |
          node --test tests/chart-context.test.js
          node --test tests/chart-data-context-sources.test.js
          node --test tests/chart-gex-dex-levels.test.js
          node --test tests/chart-earnings-markers.test.js
          node --test tests/chart-context-strip.test.js
          node --test tests/chart-context-layer-controls.test.js
      - name: Complete Node test suite
        run: node --test tests/*.test.js
      - name: Next.js production build
        run: npm run build
      - name: Publish verification result
        if: always()
        env:
          RESULT: ${{ job.status }}
          VERIFIED_SHA: ${{ github.sha }}
        run: |
          printf 'result=%s\nverified_sha=%s\n' "$RESULT" "$VERIFIED_SHA" > .chart-context-ci-result
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .chart-context-ci-result
          git commit -m "ci: record chart context verification result" || exit 0
          git push origin HEAD:codex/chart-context-layers-v1
